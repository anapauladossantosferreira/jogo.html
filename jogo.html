<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Racing Realist - 2 Players</title>
    <style>
        /* CSS INTEGRADO */
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 4px solid #444;
        }

        #ui {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            z-index: 10;
        }

        #msg-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffcc00;
            z-index: 20;
            cursor: pointer;
        }

        canvas {
            display: block;
            background-color: #333;
        }

        .stats span {
            color: #ffcc00;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stats">FASE: <span id="level">1</span>/5</div>
            <div class="stats">P1: <span id="p1-score">0</span>m</div>
            <div class="stats">P2: <span id="p2-score">0</span>m</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="msg-overlay">
            CORRIDA REALISTA<br>
            <small style="font-size: 1rem;">P1: W,A,S,D | P2: Setas</small><br><br>
            Pressione ESPAÇO para Iniciar
        </div>
    </div>

    <script>
        /* JAVASCRIPT INTEGRADO */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgOverlay = document.getElementById('msg-overlay');

        canvas.width = 600;
        canvas.height = window.innerHeight * 0.9;

        // Variáveis de Estado
        let gameActive = false;
        let level = 1;
        let roadOffset = 0;
        let speed = 6;

        // Carregamento de Imagens (Carros Realistas Top-Down)
        const car1Img = new Image();
        car1Img.src = 'https://i.imgur.com/vH0HhU9.png'; // Carro Vermelho
        const car2Img = new Image();
        car2Img.src = 'https://i.imgur.com/Bf0NnO5.png'; // Carro Azul

        // Jogadores
        const p1 = { x: 100, y: canvas.height - 180, w: 90, h: 160, score: 0 };
        const p2 = { x: 410, y: canvas.height - 180, w: 90, h: 160, score: 0 };

        const keys = {};

        // Listeners
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && !gameActive) startGame();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function startGame() {
            gameActive = true;
            msgOverlay.style.display = 'none';
            update();
        }

        function checkLevel() {
            let topScore = Math.max(p1.score, p2.score);
            let newLevel = Math.floor(topScore / 1000) + 1;
            
            if (newLevel > level && level < 5) {
                level = newLevel;
                speed += 4; // Aumenta a velocidade da pista
                document.getElementById('level').innerText = level;
            }
        }

        function update() {
            if (!gameActive) return;

            // Movimento Player 1 (WASD)
            if (keys['KeyW'] && p1.y > 0) p1.y -= 7;
            if (keys['KeyS'] && p1.y < canvas.height - p1.h) p1.y += 7;
            if (keys['KeyA'] && p1.x > 10) p1.x -= 7;
            if (keys['KeyD'] && p1.x < canvas.width/2 - 100) p1.x += 7;

            // Movimento Player 2 (Setas)
            if (keys['ArrowUp'] && p2.y > 0) p2.y -= 7;
            if (keys['ArrowDown'] && p2.y < canvas.height - p2.h) p2.y += 7;
            if (keys['ArrowLeft'] && p2.x > canvas.width/2 + 10) p2.x -= 7;
            if (keys['ArrowRight'] && p2.x < canvas.width - 100) p2.x += 7;

            // Pontuação baseada na velocidade
            p1.score += speed / 10;
            p2.score += speed / 10;
            
            checkLevel();
            draw();
            requestAnimationFrame(update);
        }

        function drawRoad() {
            // Asfalto
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Faixas laterais
            ctx.fillStyle = "#FFF";
            ctx.fillRect(5, 0, 5, canvas.height);
            ctx.fillRect(canvas.width - 10, 0, 5, canvas.height);

            // Linha Central pontilhada (animação de movimento)
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 6;
            ctx.setLineDash([40, 30]);
            ctx.lineDashOffset = -roadOffset;
            
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            
            roadOffset += speed;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();

            // Sombra dos carros para realismo
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.shadowOffsetY = 10;
            
            // Desenho dos Carros
            ctx.drawImage(car1Img, p1.x, p1.y, p1.w, p1.h);
            ctx.drawImage(car2Img, p2.x, p2.y, p2.w, p2.h);
            
            // Reset de sombra para não afetar outros elementos
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // Atualiza Interface
            document.getElementById('p1-score').innerText = Math.floor(p1.score);
            document.getElementById('p2-score').innerText = Math.floor(p2.score);
        }

        // Desen
